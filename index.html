<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects — nihilisticiconoclast</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- LOCKED LAYER — the "Tunnel" house design system. Linked from cuddly-lamp,
     never inlined, so a palette/type change there propagates here. -->
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/nihilisticiconoclast/cuddly-lamp@main/assets/tokens.css">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   PAGE LAYER — layout only; all colour / type / edges come from the tokens.
   ═══════════════════════════════════════════════════════════════════════════ */
.masthead{
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  border-bottom:var(--rule); padding-bottom:16px; margin-bottom:clamp(28px,5vw,56px);
}
.brand{display:flex; align-items:center; gap:.7rem}
.brand .wordmark{
  font-family:var(--font-data); font-size:.78rem; letter-spacing:.16em;
  text-transform:uppercase; color:var(--contour); line-height:1.3;
}
.masthead nav a{margin-left:1.3rem; font-family:var(--font-data); font-size:.8rem}

.grid{
  display:grid; gap:1px; margin-top:clamp(28px,5vw,48px);
  background:color-mix(in srgb, var(--contour) 38%, transparent); /* the gap reads as contour hairlines */
  border:var(--rule);
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
}

.card{
  position:relative; display:flex; flex-direction:column;
  background:var(--paper); padding:1.25rem 1.35rem;
  transition:background .15s ease;
}
.card:hover{background:color-mix(in srgb, var(--index) 7%, var(--paper))}

.card h2{font-size:var(--step-1); margin:0 0 .4rem; line-height:1.1}
/* stretched link: the whole card is clickable; the source link sits above it */
.card h2 a{color:var(--ink); text-decoration:none}
.card:hover h2 a{color:var(--route)}
.card h2 a::after{content:""; position:absolute; inset:0}

.card p{margin:0 0 1.1rem; max-width:none; color:var(--contour); font-size:var(--step--1); flex:1}

.meta{
  display:flex; gap:1.1rem; align-items:center;
  font-family:var(--font-data); font-size:var(--step--1); color:var(--contour);
  position:relative; z-index:1;
}
.meta a{color:var(--incident)}

.state{color:var(--contour); font-family:var(--font-data); font-size:var(--step--1); padding:2rem 0}

.search-row{
  display:flex; align-items:center; gap:1rem; margin-top:clamp(20px,4vw,36px);
}
.search-row input[type="search"]{
  flex:1; padding:.55rem .75rem;
  background:var(--paper); color:var(--ink);
  border:var(--rule); outline:none;
  font-family:var(--font-data); font-size:var(--step--1);
  appearance:none; -webkit-appearance:none;
}
.search-row input[type="search"]:focus{
  border-color:var(--route);
  box-shadow:0 0 0 2px color-mix(in srgb, var(--route) 25%, transparent);
}
.search-row input[type="search"]::placeholder{color:var(--contour); opacity:1}
.search-count{
  font-family:var(--font-data); font-size:var(--step--1); color:var(--contour);
  white-space:nowrap;
}
.card[hidden]{display:none}

/* the per-page doodle: a margin decoration placed at RANDOM. JS drops it into one
   of six edge slots on load — left/right × top/middle/bottom — bleeding into the
   page gutter and sitting behind the content, so it never lands directly behind the
   text or shoves the page around. (overflow-x is clipped so the bleed can't scroll.) */
html{overflow-x:hidden}
body{position:relative}
.doodle{position:absolute;width:clamp(150px,20vw,260px);margin:0;opacity:.6;z-index:-1;pointer-events:none}
</style>
</head>
<body data-seed="nihilisticiconoclast">
  <main class="wrap">

    <div class="masthead">
      <div class="brand">
        <!-- the brand logo: a SMALL seeded masthead mark -->
        <span class="sig" id="sig"></span>
        <span class="wordmark">Projects<br>nihilisticiconoclast</span>
      </div>
      <nav><a href="https://github.com/nihilisticiconoclast" target="_blank" rel="noopener">GitHub</a></nav>
    </div>

    <p class="eyebrow">Published repositories</p>
    <h1>Projects</h1>
    <p class="lede">Generated live from published repositories — every public repo
    with GitHub Pages enabled appears here automatically.</p>

    <!-- per-page doodle: a seeded scribble, off to the right, between sections -->
    <div class="doodle doodle--right doodle--bleed-right" id="doodle"></div>

    <div class="search-row">
      <input type="search" id="search" placeholder="Search readmes…" autocomplete="off" aria-label="Search repositories">
      <span id="search-count" class="search-count" aria-live="polite"></span>
    </div>

    <div id="grid" class="grid"><p class="state">Loading…</p></div>

  </main>

<!-- tunnel-figure.js — the seeded signature generator. Linked from cuddly-lamp,
     never inlined, so the figure logic stays in lock-step with the tokens. -->
<script src="https://cdn.jsdelivr.net/gh/nihilisticiconoclast/cuddly-lamp@main/assets/tunnel-figure.js"></script>

<script>
/* ── live repo cards ──────────────────────────────────────────────────────── */
const USER = "nihilisticiconoclast";
// Repos to never show (the home repo itself, plus anything you want hidden):
const EXCLUDE = new Set([`${USER}.github.io`]);

const prettify = s => s.replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
const esc = s => String(s).replace(/[&<>"']/g, c =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// Richer blurb: the first prose paragraph of the repo's README, falling back to
// the GitHub description. Read from raw.githubusercontent, so it costs no API quota.
function firstParagraph(md) {
  const para = [];
  for (const raw of md.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) { if (para.length) break; else continue; }
    // skip headings, images, html, tables, code fences, blockquotes, lists, rules
    if (/^(#|!\[|<|\||```|>|---|===|\[!\[|[-*+]\s|\d+\.\s)/.test(line)) {
      if (para.length) break; else continue;
    }
    para.push(line);
  }
  let text = para.join(" ")
    .replace(/!\[[^\]]*\]\([^)]*\)/g, "")          // images
    .replace(/\[([^\]]*)\]\([^)]*\)/g, "$1")       // links -> text
    .replace(/`([^`]+)`/g, "$1")                   // inline code
    .replace(/[*_]{1,3}([^*_]+)[*_]{1,3}/g, "$1")  // bold / italic
    .replace(/\s+/g, " ")
    .trim();
  if (!text) return null;
  const MAX = 220;
  if (text.length > MAX) text = text.slice(0, MAX).replace(/\s+\S*$/, "") + "…";
  return text;
}

async function readmeFetch(r) {
  try {
    const res = await fetch(
      `https://raw.githubusercontent.com/${USER}/${r.name}/${r.default_branch}/README.md`
    );
    if (!res.ok) return { blurb: null, full: "" };
    const md = await res.text();
    return { blurb: firstParagraph(md), full: md };
  } catch { return { blurb: null, full: "" }; }
}

async function load() {
  const grid = document.getElementById("grid");
  try {
    const res = await fetch(
      `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`,
      { headers: { Accept: "application/vnd.github+json" } }
    );
    if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
    const repos = await res.json();

    // The "automatic" contract: public + Pages enabled + not a fork/archive.
    const visible = repos.filter(r =>
      r.has_pages && !r.fork && !r.archived && !EXCLUDE.has(r.name)
    );

    if (!visible.length) {
      grid.innerHTML = `<p class="state">No published projects yet — enable Pages on a repo to add it here.</p>`;
      return;
    }

    grid.innerHTML = "";
    const fetched = await Promise.all(visible.map(readmeFetch));
    visible.forEach((r, i) => {
      const page = `https://${USER}.github.io/${r.name}/`;
      const { blurb, full } = fetched[i];
      const displayBlurb = blurb || r.description || "No description set.";
      const card = document.createElement("article");
      card.className = "card";
      // searchtext combines name, description, and full README for matching
      card.dataset.searchtext = [r.name, r.description || "", full].join(" ").toLowerCase();
      card.innerHTML = `
        <h2><a href="${page}">${esc(prettify(r.name))}</a></h2>
        <p>${esc(displayBlurb)}</p>
        <div class="meta">
          <span>updated ${new Date(r.updated_at).toLocaleDateString()}</span>
          <a href="${r.html_url}" target="_blank" rel="noopener">source</a>
        </div>`;
      grid.appendChild(card);
    });
    initSearch(visible.length);
  } catch (err) {
    grid.innerHTML = `<p class="state">Couldn't load projects (${esc(err.message)}).
      The unauthenticated GitHub API allows 60 requests/hour per IP — if that's the cause, it'll recover shortly.</p>`;
  }
}

function initSearch(total) {
  const input = document.getElementById("search");
  const countEl = document.getElementById("search-count");
  function filter() {
    const q = input.value.trim().toLowerCase();
    const cards = document.querySelectorAll("#grid .card");
    let shown = 0;
    cards.forEach(card => {
      const match = !q || card.dataset.searchtext.includes(q);
      card.hidden = !match;
      if (match) shown++;
    });
    countEl.textContent = q ? `${shown} of ${total}` : "";
  }
  input.addEventListener("input", filter);
}

load();

/* ── the signature: the FIXED house mark + a per-page doodle ──────────────── */
const seed = document.body.dataset.seed || location.pathname || document.title;
document.getElementById("sig").innerHTML    = TunnelFigure.tunnelFigureSVG(null, { variant: "mark" });
document.getElementById("doodle").innerHTML = TunnelFigure.tunnelFigureSVG(seed, { variant: "doodle" });

// doodle position — random each load: one of six edge slots (left/right ×
// top/middle/bottom), bleeding into the gutter so it never sits behind the text.
(function (d) {
  if (!d) return;
  var side = Math.random() < 0.5 ? 'left' : 'right';
  var vert = ['top', 'middle', 'bottom'][Math.floor(Math.random() * 3)];
  d.style.top = d.style.bottom = d.style.left = d.style.right = 'auto';
  var tx, ty = '';
  if (side === 'left') { d.style.left = '0'; tx = 'translateX(-42%)'; }
  else { d.style.right = '0'; tx = 'translateX(42%)'; }
  if (vert === 'top') d.style.top = 'clamp(80px,12vh,140px)';
  else if (vert === 'middle') { d.style.top = '50%'; ty = ' translateY(-50%)'; }
  else d.style.bottom = 'clamp(40px,8vh,100px)';
  d.style.transform = tx + ty;
})(document.getElementById('doodle'));
</script>
</body>
</html>
