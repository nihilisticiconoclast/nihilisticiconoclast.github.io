<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<style>
  /* ── Token layer ── replace with Tunnel tokens ───────────────────── */
  :root {
    --bg:      #14171c;
    --surface: #1c2027;
    --border:  #2b313b;
    --text:    #dfe3ea;
    --muted:   #8b95a4;
    --accent:  #b6c2cf;
    --radius:  10px;
    --maxw:    1080px;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  /* ────────────────────────────────────────────────────────────────── */

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: clamp(1.5rem, 5vw, 3.5rem) 1.25rem;
    background: var(--bg); color: var(--text);
    font: 16px/1.55 var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: var(--maxw); margin: 0 auto; }

  header { margin-bottom: 2.5rem; }
  h1 {
    font: 600 1.05rem/1 var(--mono);
    letter-spacing: .02em; margin: 0 0 .5rem;
    text-transform: uppercase;
  }
  header p { margin: 0; color: var(--muted); font-size: .95rem; }

  .grid {
    display: grid; gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
  }

  .card {
    position: relative;
    display: flex; flex-direction: column;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.15rem 1.25rem;
    transition: border-color .15s ease, transform .15s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }

  .card h2 { font-size: 1.02rem; font-weight: 600; margin: 0 0 .45rem; }
  /* Stretched link: whole card is clickable, source link sits above it */
  .card h2 a { color: inherit; text-decoration: none; }
  .card h2 a::after { content: ""; position: absolute; inset: 0; }

  .card p { margin: 0 0 1rem; color: var(--muted); font-size: .9rem; flex: 1; }

  .meta {
    display: flex; gap: 1rem; align-items: center;
    font: .76rem/1 var(--mono); color: var(--muted);
    position: relative; z-index: 1;
  }
  .meta a { color: var(--accent); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }

  .state { color: var(--muted); padding: 2rem 0; font-size: .95rem; }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Projects</h1>
    <p>Generated live from published repositories.</p>
  </header>
  <div id="grid" class="grid"><p class="state">Loading…</p></div>
</div>

<script>
  const USER = "nihilisticiconoclast";
  // Repos to never show (the home repo itself, plus anything you want hidden):
  const EXCLUDE = new Set([`${USER}.github.io`]);

  const prettify = s => s.replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  const esc = s => String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  async function load() {
    const grid = document.getElementById("grid");
    try {
      const res = await fetch(
        `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`,
        { headers: { Accept: "application/vnd.github+json" } }
      );
      if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
      const repos = await res.json();

      // The "automatic" contract: public + Pages enabled + not a fork/archive.
      const visible = repos.filter(r =>
        r.has_pages && !r.fork && !r.archived && !EXCLUDE.has(r.name)
      );

      if (!visible.length) {
        grid.innerHTML = `<p class="state">No published projects yet — enable Pages on a repo to add it here.</p>`;
        return;
      }

      grid.innerHTML = "";
      for (const r of visible) {
        const page = `https://${USER}.github.io/${r.name}/`;
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h2><a href="${page}">${esc(prettify(r.name))}</a></h2>
          <p>${esc(r.description || "No description set.")}</p>
          <div class="meta">
            <span>updated ${new Date(r.updated_at).toLocaleDateString()}</span>
            <a href="${r.html_url}" target="_blank" rel="noopener">source</a>
          </div>`;
        grid.appendChild(card);
      }
    } catch (err) {
      grid.innerHTML = `<p class="state">Couldn't load projects (${esc(err.message)}).
        The unauthenticated GitHub API allows 60 requests/hour per IP — if that's the cause, it'll recover shortly.</p>`;
    }
  }

  load();
</script>
</body>
</html>
