<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects — nihilisticiconoclast</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- the LOCKED layer of the "Tunnel" house design system, served from cuddly-lamp's Pages site -->
<link rel="stylesheet" href="https://nihilisticiconoclast.github.io/cuddly-lamp/assets/tokens.css">
<style>
  /* page layout only — colour / type / edges all come from tokens.css */
  .masthead{
    display:flex; align-items:center; justify-content:space-between; gap:1rem;
    border-bottom:var(--rule); padding-bottom:16px; margin-bottom:clamp(28px,5vw,56px);
  }
  .brand{display:flex; align-items:center; gap:.7rem}
  .brand .wordmark{
    font-family:var(--font-data); font-size:.78rem; letter-spacing:.16em;
    text-transform:uppercase; color:var(--contour); line-height:1.3;
  }
  .masthead nav a{margin-left:1.3rem; font-family:var(--font-data); font-size:.8rem}

  .grid{
    display:grid; gap:1px; margin-top:clamp(28px,5vw,48px);
    background:color-mix(in srgb, var(--contour) 38%, transparent); /* the gap reads as contour hairlines */
    border:var(--rule);
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  }

  .card{
    position:relative; display:flex; flex-direction:column;
    background:var(--paper); padding:1.25rem 1.35rem;
    transition:background .15s ease;
  }
  .card:hover{background:color-mix(in srgb, var(--index) 7%, var(--paper))}

  .card h2{
    font-size:var(--step-1); margin:0 0 .4rem; line-height:1.1;
  }
  /* stretched link: the whole card is clickable; the source link sits above it */
  .card h2 a{color:var(--ink); text-decoration:none}
  .card:hover h2 a{color:var(--route)}
  .card h2 a::after{content:""; position:absolute; inset:0}

  .card p{margin:0 0 1.1rem; max-width:none; color:var(--contour); font-size:var(--step--1); flex:1}

  .meta{
    display:flex; gap:1.1rem; align-items:center;
    font-family:var(--font-data); font-size:var(--step--1); color:var(--contour);
    position:relative; z-index:1;
  }
  .meta a{color:var(--incident)}

  .state{color:var(--contour); font-family:var(--font-data); font-size:var(--step--1); padding:2rem 0}
</style>
</head>
<body data-seed="nihilisticiconoclast">
  <main class="wrap">

    <div class="masthead">
      <div class="brand">
        <!-- the signature: a SMALL masthead mark, the recurring doodle -->
        <span class="sig" id="sig"></span>
        <span class="wordmark">Projects<br>nihilisticiconoclast</span>
      </div>
      <nav><a href="https://github.com/nihilisticiconoclast" target="_blank" rel="noopener">GitHub</a></nav>
    </div>

    <p class="eyebrow">Published repositories</p>
    <h1>Projects</h1>
    <p class="lede">Generated live from published repositories — every public repo
    with GitHub Pages enabled appears here automatically.</p>

    <div id="grid" class="grid"><p class="state">Loading…</p></div>

  </main>

  <script>
    const USER = "nihilisticiconoclast";
    // Repos to never show (the home repo itself, plus anything you want hidden):
    const EXCLUDE = new Set([`${USER}.github.io`]);

    const prettify = s => s.replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
    const esc = s => String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

    async function load() {
      const grid = document.getElementById("grid");
      try {
        const res = await fetch(
          `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`,
          { headers: { Accept: "application/vnd.github+json" } }
        );
        if (!res.ok) throw new Error(`GitHub API returned ${res.status}`);
        const repos = await res.json();

        // The "automatic" contract: public + Pages enabled + not a fork/archive.
        const visible = repos.filter(r =>
          r.has_pages && !r.fork && !r.archived && !EXCLUDE.has(r.name)
        );

        if (!visible.length) {
          grid.innerHTML = `<p class="state">No published projects yet — enable Pages on a repo to add it here.</p>`;
          return;
        }

        grid.innerHTML = "";
        for (const r of visible) {
          const page = `https://${USER}.github.io/${r.name}/`;
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <h2><a href="${page}">${esc(prettify(r.name))}</a></h2>
            <p>${esc(r.description || "No description set.")}</p>
            <div class="meta">
              <span>updated ${new Date(r.updated_at).toLocaleDateString()}</span>
              <a href="${r.html_url}" target="_blank" rel="noopener">source</a>
            </div>`;
          grid.appendChild(card);
        }
      } catch (err) {
        grid.innerHTML = `<p class="state">Couldn't load projects (${esc(err.message)}).
          The unauthenticated GitHub API allows 60 requests/hour per IP — if that's the cause, it'll recover shortly.</p>`;
      }
    }

    load();
  </script>

  <!-- the seeded signature mark, served from cuddly-lamp's Pages site -->
  <script src="https://nihilisticiconoclast.github.io/cuddly-lamp/assets/tunnel-figure.js"></script>
  <script>
    // small, silent mark, seeded from the page (default 'mark' variant)
    const seed = document.body.dataset.seed || location.pathname || document.title;
    if (window.TunnelFigure) {
      document.getElementById("sig").innerHTML = TunnelFigure.tunnelFigureSVG(seed);
    }
  </script>
</body>
</html>
